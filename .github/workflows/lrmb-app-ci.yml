name: LRMB App CI

on:
  pull_request:
    paths:
      - "clients/lrmb/app/**"
      - ".github/workflows/lrmb-app-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "clients/lrmb/app/**"
      - ".github/workflows/lrmb-app-ci.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/lrmb/app
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/lrmb/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run production verification gate
        run: npm run verify:prod
