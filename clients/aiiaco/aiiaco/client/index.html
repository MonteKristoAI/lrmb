    <!-- Resource hints for CWV: preconnect to critical third parties before they are requested -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <link rel="preload" as="image" href="/images/hero-bg-1280.webp" imagesrcset="/images/hero-bg-640.webp 640w, /images/hero-bg-960.webp 960w, /images/hero-bg-1280.webp 1280w, /images/hero-bg-1920.webp 1920w" imagesizes="100vw" fetchpriority="high" />

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6XQ3T33HTF');
    </script>

    <!--
      NOTE: title, meta description, canonical, OG, Twitter, and robots tags are injected
      per-page via react-helmet-async through client/src/seo/SEO.tsx.
      DO NOT hardcode them here - they will duplicate or conflict with per-page values.
      The only fallback title below exists so Googlebot sees SOMETHING if helmet fails.
    -->
    <title>AiiACo | AI Integration Company for Real Estate, Mortgage &amp; Management Consulting</title>
    <meta name="author" content="AiiACo" />
    <!-- Open Graph Image (global fallback, overridden per page by SEO.tsx). Absolute URLs required by OG spec. -->
    <meta property="og:image" content="https://aiiaco.com/images/og-default.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="AiiACo - AI Integration Authority for the Corporate Age" />
    <meta property="og:site_name" content="AiiACo" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@aiiaco" />
    <meta name="twitter:image" content="https://aiiaco.com/images/og-default.webp" />
    <meta name="twitter:image:alt" content="AiiACo - AI Integration Authority for the Corporate Age" />
    <meta name="theme-color" content="#03050A" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Favicons - 192px+ required for Google site icon display -->
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png?v=3" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png?v=3" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
    <!-- Skip to content link - visible only on keyboard focus (WCAG 2.4.1) -->
    <style>
      .skip-to-content {
        position: absolute;
        left: -9999px;
        top: 0;
        z-index: 10000;
        padding: 12px 20px;
        background: #D4A843;
        color: #03050A;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        font-weight: 700;
        font-size: 14px;
        text-decoration: none;
        border-radius: 0 0 8px 0;
      }
      .skip-to-content:focus {
        left: 0;
      }
    </style>
    <!-- System font stack: SF Pro on Apple, Segoe UI on Windows, system-ui elsewhere -->
