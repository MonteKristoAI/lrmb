<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Bridge Hospice</title>
  <meta name="description" content="The page you're looking for doesn't exist or has been moved. Return to Bridge Hospice's homepage or contact us for help.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design System CSS -->
  <link rel="stylesheet" href="css/styles.css?v=3">

  <style>
    /* ================================================================
       404 PAGE — Full dark background, centered content
       ================================================================ */
    body {
      background: var(--navy-950);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ================================================================
       NAV (matches site pattern)
       ================================================================ */
    .nav {
      position: relative;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 56px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    @media (max-width: 768px) {
      .nav { padding: 16px 24px; }
    }
    .nav-logo {
      font-family: var(--font-heading);
      font-size: 1.35rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: rgba(240,236,228,0.95);
    }
    .nav-logo em {
      font-style: italic;
      color: var(--gold-400);
      font-weight: 400;
    }
    .nav-links {
      display: flex;
      gap: 32px;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: rgba(240,236,228,0.45);
      list-style: none;
    }
    .nav-links a {
      position: relative;
      transition: color 0.4s;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 1px;
      background: var(--gold-500);
      transform: scaleX(0);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .nav-links a:hover { color: rgba(240,236,228,1); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-phone {
      font-size: 0.72rem;
      color: var(--gold-500);
      letter-spacing: 0.05em;
      padding: 10px 24px;
      border: 1px solid rgba(200,169,110,0.25);
      border-radius: 6px;
      transition: all 0.4s;
    }
    .nav-phone:hover {
      background: rgba(200,169,110,0.08);
      border-color: rgba(200,169,110,0.5);
    }
    @media (max-width: 1024px) {
      .nav-links { display: none; }
    }
    @media (max-width: 768px) {
      .nav-phone { font-size: 0.65rem; padding: 8px 16px; }
    }

    /* ================================================================
       404 CONTENT
       ================================================================ */
    .error-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 24px;
      position: relative;
      overflow: hidden;
    }
    .error-page::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(30,58,95,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 30% 60%, rgba(200,169,110,0.03) 0%, transparent 60%);
    }
    .error-content {
      position: relative;
      z-index: 2;
      max-width: 520px;
    }
    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 400;
      line-height: 1;
      color: var(--gold-500);
      margin-bottom: 16px;
      letter-spacing: -0.03em;
      opacity: 0.85;
    }
    .error-content h1 {
      font-family: var(--font-heading);
      font-size: var(--text-h2);
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 16px;
    }
    .error-content p {
      font-size: var(--text-lg);
      color: rgba(240,236,228,0.45);
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .error-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .section-dark .btn-outline {
      border-color: rgba(255,255,255,0.12);
      color: rgba(240,236,228,0.7);
    }
    .section-dark .btn-outline:hover {
      border-color: rgba(200,169,110,0.4);
      color: var(--gold-400);
    }
  </style>
</head>
<body>
  <a href="#main" class="sr-only skip-link">Skip to content</a>

  <!-- Navigation -->
  <nav class="nav">
    <a href="index.html" class="nav-logo" style="display:flex; align-items:center;"><img src="assets/logo-white.png" alt="Bridge Hospice" style="height:40px; width:auto;"></a>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="valor.html">Valor</a></li>
      <li><a href="daves-wish.html">Dave's Wish</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="referral.html">Referral</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="tel:8069933900" class="nav-phone">806-993-3900</a>
  </nav>

  <main id="main" class="error-page section-dark">
    <div class="error-content">
      <div class="error-code reveal">404</div>
      <h1 class="reveal reveal-delay-1">Page Not Found</h1>
      <p class="reveal reveal-delay-2">The page you're looking for doesn't exist or has been moved.</p>
      <div class="error-buttons reveal reveal-delay-3">
        <a href="index.html" class="btn-primary">Return Home</a>
        <a href="contact.html" class="btn-outline">Contact Us</a>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
